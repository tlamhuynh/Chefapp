name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      versionCode:
        description: 'Version Code (integer)'
        required: false
        default: '1'
      versionName:
        description: 'Version Name'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Icons/Splash
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set App Version and Environment Variables
        run: |
          VERSION_NAME=${{ github.event.inputs.versionName || '1.0.0' }}
          VERSION_CODE=${{ github.event.inputs.versionCode || 1 }}
          DATE=$(date +'%Y%m%d')
          
          # If triggered by a tag like v1.2.3
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/v}
          fi
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "Setting version to: $VERSION_NAME ($VERSION_CODE) on $DATE"
          
          # Update build.gradle
          sed -i -e "s/versionCode [0-9]*/versionCode $VERSION_CODE/g" android/app/build.gradle
          sed -i -e "s/versionName \".*\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle

      - name: Build APK with Gradle
        working-directory: ./android
        run: |
          gradle wrapper --gradle-version 8.11.1
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/SousChef-AI-Release-${{ env.DATE }}-v${{ env.VERSION_NAME }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SousChef-AI-Release-${{ env.DATE }}-v${{ env.VERSION_NAME }}.apk
          path: android/app/build/outputs/apk/debug/SousChef-AI-Release-${{ env.DATE }}-v${{ env.VERSION_NAME }}.apk
