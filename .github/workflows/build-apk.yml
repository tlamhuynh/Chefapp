name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      versionCode:
        description: 'Version Code (integer)'
        required: false
        default: '1'
      versionName:
        description: 'Version Name'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Icons/Splash
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: 🔑 Cache Android Keystore (giữ SHA-1 không đổi)
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: android/app/debug.keystore
          key: android-debug-keystore-${{ runner.os }}-v1

      - name: 🔑 Generate Keystore if not exists
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          echo "✅ Đã tạo Debug Keystore mới"

      - name: 🔑 PRINT FIREBASE SHA-1 FINGERPRINT
        run: |
          echo "=========================================================="
          echo "📋 BẠN HÃY COPY MÃ SHA-1 BÊN DƯỚI VÀ DÁN VÀO FIREBASE CONSOLE:"
          echo "=========================================================="
          keytool -list -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1:"
          echo "=========================================================="

      - name: Set App Version and Environment Variables
        run: |
          VERSION_NAME=${{ github.event.inputs.versionName || '1.0.0' }}
          VERSION_CODE=${{ github.event.inputs.versionCode || 1 }}
          DATE=$(date +'%Y%m%d')
          
          # If triggered by a tag like v1.2.3
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/v}
          fi
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "Setting version to: $VERSION_NAME ($VERSION_CODE) on $DATE"
          
          # Update build.gradle
          sed -i -e "s/versionCode [0-9]*/versionCode $VERSION_CODE/g" android/app/build.gradle
          sed -i -e "s/versionName \".*\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle

      - name: Build APK with Gradle
        working-directory: ./android
        run: |
          gradle wrapper --gradle-version 8.11.1
          chmod +x ./gradlew
          
          # Force Gradle to use our stored debug.keystore
          cat << 'EOF' > app/build-extras.gradle
          android {
            signingConfigs {
              debug {
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
              }
            }
          }
          EOF
          
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/SousChef-AI-Release-${{ env.DATE }}-v${{ env.VERSION_NAME }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SousChef-AI-Release-${{ env.DATE }}-v${{ env.VERSION_NAME }}.apk
          path: android/app/build/outputs/apk/debug/SousChef-AI-Release-${{ env.DATE }}-v${{ env.VERSION_NAME }}.apk
